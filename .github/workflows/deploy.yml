name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REGISTRY: 367560037937.dkr.ecr.eu-north-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkoutt
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. Login to ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Set TAG (commit SHA)
    - name: Set image tag
      run: echo "TAG=${{ github.sha }}" >> $GITHUB_ENV

    # 5. Build & push backend (SHA tag + latest tag)
    - name: Build & push backend
      run: |
        docker build -t $ECR_REGISTRY/pfefinal-backend:${{ github.sha }} ./todo-backend
        docker push $ECR_REGISTRY/pfefinal-backend:${{ github.sha }}
        docker tag $ECR_REGISTRY/pfefinal-backend:${{ github.sha }} $ECR_REGISTRY/pfefinal-backend:latest
        docker push $ECR_REGISTRY/pfefinal-backend:latest

    # 6. Build & push frontend (SHA tag + latest tag)
    - name: Build & push frontend
      run: |
        docker build -t $ECR_REGISTRY/pfefinal-frontend:${{ github.sha }} ./todo-frontend
        docker push $ECR_REGISTRY/pfefinal-frontend:${{ github.sha }}
        docker tag $ECR_REGISTRY/pfefinal-frontend:${{ github.sha }} $ECR_REGISTRY/pfefinal-frontend:latest
        docker push $ECR_REGISTRY/pfefinal-frontend:latest

    # 7. Deploy to EC2 via Bastion
    - name: Deploy via Bastion
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 10.0.11.140
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        proxy_host: ${{ secrets.EC2_HOST }}
        proxy_username: ec2-user
        proxy_key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          echo "=== DEPLOY START ==="

          # These are expanded by GitHub Actions BEFORE sending to EC2
          export ECR_REGISTRY=367560037937.dkr.ecr.eu-north-1.amazonaws.com
          export TAG=${{ github.sha }}

          cd /home/ec2-user/app

          echo "=== ECR LOGIN ==="
          aws ecr get-login-password --region eu-north-1 | \
            docker login --username AWS --password-stdin \
            367560037937.dkr.ecr.eu-north-1.amazonaws.com

          echo "=== STOP & REMOVE OLD CONTAINERS ==="
          docker compose down --remove-orphans || true
          docker rm -f todo-backend todo-frontend todo-nginx 2>/dev/null || true

          echo "=== PULL NEW IMAGES FROM ECR ==="
          docker compose pull

          echo "=== START NEW CONTAINERS ==="
          docker compose up -d

          echo "=== CLEAN OLD IMAGES ==="
          docker image prune -af

          echo "=== VERIFY RUNNING CONTAINERS ==="
          docker ps

          echo "=== DEPLOY DONE ==="