name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ── CHECKOUT ───────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── NODE SETUP ────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── BACKEND INSTALL ───────────────────────
      - name: Install Backend dependencies
        working-directory: ./todo-backend
        run: npm install

      # ── BACKEND TESTS (GENERATES COVERAGE) ────
      - name: Run Backend Tests
        working-directory: ./todo-backend
        run: npm test

      # ── SONARCLOUD ANALYSIS ───────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── SECRET SCAN ───────────────────────────
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      # ── BUILD BACKEND IMAGE ───────────────────
      - name: Build Backend Image
        run: docker build -t pfefinal-backend ./todo-backend

      # ── BUILD FRONTEND IMAGE ──────────────────
      - name: Build Frontend Image
        run: docker build -t pfefinal-frontend ./todo-frontend

      # ── TRIVY BACKEND SCAN ────────────────────
      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: 'pfefinal-backend'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignorefile: .trivyignore

      # ── TRIVY FRONTEND SCAN ───────────────────
      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: 'pfefinal-frontend'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignorefile: .trivyignore

      # ── DISCORD SUCCESS EMBED ─────────────────
      - name: Discord Success Notification
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ DevSecOps Pipeline Passed"
          description: |
            The CI/CD pipeline completed successfully.

            • Repository: `${{ github.repository }}`
            • Branch: `${{ github.ref_name }}`
            • Triggered by: `${{ github.actor }}`
            • Commit: `${{ github.sha }}`
          color: 0x28A745
          username: "PFE DevSecOps"
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

      # ── DISCORD FAILURE EMBED ─────────────────
      - name: Discord Failure Notification
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "❌ DevSecOps Pipeline Failed"
          description: |
            One or more pipeline stages failed.

            • Repository: `${{ github.repository }}`
            • Branch: `${{ github.ref_name }}`
            • Triggered by: `${{ github.actor }}`
            • Commit: `${{ github.sha }}`

            Review GitHub Actions logs for diagnostics.
          color: 0xDC3545
          username: "PFE DevSecOps"
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png