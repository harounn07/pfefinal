name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ── CHECKOUT (FIX SHALLOW CLONE) ─────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 مهم ل SonarCloud

      # ── NODE SETUP ──────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── INSTALL ─────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── LINT ────────────────────────────────────
      - name: Run ESLint
        run: npx eslint . || true

      # ── TESTS ───────────────────────────────────
      - name: Run Tests
        run: npm test --if-present

      # ── SONARCLOUD ──────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── SECRET SCAN ─────────────────────────────
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      # ── BUILD BACKEND ───────────────────────────
      - name: Build Backend Image
        run: docker build -t pfefinal-backend ./todo-backend

      # ── BUILD FRONTEND ──────────────────────────
      - name: Build Frontend Image
        run: docker build -t pfefinal-frontend ./todo-frontend

      # ── TRIVY BACKEND ───────────────────────────
      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: 'pfefinal-backend'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignorefile: .trivyignore

      # ── TRIVY FRONTEND ──────────────────────────
      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          image-ref: 'pfefinal-frontend'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'