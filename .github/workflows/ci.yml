name: DevSecOps CI Pipeline

on:
push:
branches:
- main
- dev
pull_request:

jobs:
ci:
runs-on: ubuntu-latest

steps:
  # 1. Checkout
  - name: Checkout Code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  # 2. Setup Node
  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 18

  # 3. Install Backend
  - name: Install Backend
    run: |
      cd todo-backend
      npm install

  # 4. Install Frontend
  - name: Install Frontend
    run: |
      cd todo-frontend
      npm install

  # 5. Build Backend Docker
  - name: Build Backend Docker
    run: docker build -t pfefinal-backend ./todo-backend

  # 6. Build Frontend Docker
  - name: Build Frontend Docker
    run: docker build -t pfefinal-frontend ./todo-frontend

  # 7. Trivy Backend Scan
  - name: Trivy Backend Scan
    uses: aquasecurity/trivy-action@0.28.0
    with:
      image-ref: pfefinal-backend
      severity: CRITICAL,HIGH
      exit-code: '0'

  # 8. Trivy Frontend Scan
  - name: Trivy Frontend Scan
    uses: aquasecurity/trivy-action@0.28.0
    with:
      image-ref: pfefinal-frontend
      severity: CRITICAL,HIGH
      exit-code: '0'