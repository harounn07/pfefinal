name: Debug CI

on:
push:

jobs:
debug:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Show structure
    run: |
      echo "ROOT:"
      ls -la
      echo "BACKEND:"
      ls -la todo-backend || echo "missing backend"
      echo "FRONTEND:"
      ls -la todo-frontend || echo "missing frontend"

  - name: Test backend install
    run: |
      cd todo-backend || exit 1
      npm install

  - name: Test frontend install
    run: |
      cd todo-frontend || exit 1
      npm install

  - name: Test backend docker build
    run: docker build -t test-backend ./todo-backend

  - name: Test frontend docker build
    run: docker build -t test-frontend ./todo-frontend