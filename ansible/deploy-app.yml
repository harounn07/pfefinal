- name: Deploy Docker App
  hosts: app
  become: false

  vars_files:
    - secrets.yml

  tasks:

    - name: Install Git
      become: true
      dnf:
        name: git
        state: present

    - name: Ensure app directory exists
      become: true
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Clone project repo
      git:
        repo: "https://github.com/harounn07/pfefinal.git"
        dest: /home/ec2-user/app
        version: main
        force: yes

    - name: Create .env file
      become: true
      copy:
        dest: /home/ec2-user/app/.env
        owner: ec2-user
        group: ec2-user
        content: |
          PORT=3001
          ECR_REGISTRY=367560037937.dkr.ecr.eu-north-1.amazonaws.com
          TAG=latest
          DB_HOST={{ db_host }}
          DB_PORT={{ db_port }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          DB_NAME={{ db_name }}
          DB_SSL={{ db_ssl }}
          JWT_SECRET={{ jwt_secret }}
          JWT_EXPIRES_IN={{ jwt_expires_in }}
          CORS_ORIGIN={{ cors_origin }}

    - name: Login to ECR
      shell: |
        aws ecr get-login-password --region eu-north-1 | \
        docker login --username AWS --password-stdin 367560037937.dkr.ecr.eu-north-1.amazonaws.com

    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: /home/ec2-user/app

    - name: Restart containers
      command: docker compose up -d --force-recreate
      args:
        chdir: /home/ec2-user/app

    - name: Cleanup old images
      shell: docker image prune -af

    #ss 