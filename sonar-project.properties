sonar.projectKey=pfe-devsecops
sonar.organization=your-org

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclude dependencies and generated files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**

# Exclude test files from main analysis
sonar.test.exclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts