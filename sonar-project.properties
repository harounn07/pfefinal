# Project identification
sonar.projectKey=pfe-devsecops
sonar.organization=haroun

# Source code settings
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions (important for Node projects)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**

# Optional: ignore test files in main analysis
sonar.test.exclusions=**/*.test.js,**/*.spec.js,**/*.test.ts,**/*.spec.ts