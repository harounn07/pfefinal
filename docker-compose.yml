version: "3.9"

# ─────────────────────────────────────────────
# Services: nginx · frontend · backend
# Database: Amazon RDS (external)
# Network: todo-net
# ─────────────────────────────────────────────

services:

  # ── Backend ─────────────────────────────────
  backend:
    build:
      context: ./todo-backend
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001

      # RDS connection
      DB_HOST: ${DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "true"

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    networks:
      - todo-net

  # ── Frontend ────────────────────────────────
  frontend:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - todo-net

  # ── Nginx ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - todo-net

# ── Network ───────────────────────────────────
networks:
  todo-net:
    driver: bridge
